    #        echo "$dir is a symlink -> $(readlink $dir)"
    #      elif [ -d "$dir" ]; then
    #        du -sh "$dir" 2>/dev/null || echo "$dir permission denied"
    #      else
    #        echo "$dir missing or not a dir"
    #      fi
